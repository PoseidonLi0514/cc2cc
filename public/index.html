<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>cc2cc 管理面板</title>
  <style>
    :root {
      --bg-primary: #09090b;
      --bg-card: #18181b;
      --bg-input: #27272a;
      --bg-hover: #3f3f46;
      --border: #27272a;
      --border-hover: #3f3f46;
      --text-primary: #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted: #71717a;
      --accent: #6366f1;
      --accent-hover: #818cf8;
      --green: #22c55e;
      --green-dim: #16a34a;
      --red: #ef4444;
      --red-dim: #dc2626;
      --yellow: #eab308;
      --radius: 10px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* 登录页 */
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg-primary); z-index: 2000;
      display: flex; align-items: center; justify-content: center;
    }
    .login-box {
      width: 400px; text-align: center;
    }
    .login-logo {
      width: 56px; height: 56px; margin: 0 auto 20px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 14px; display: flex; align-items: center; justify-content: center;
      font-size: 22px; font-weight: 700; color: white; letter-spacing: -1px;
    }
    .login-box h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; }
    .login-box .subtitle { color: var(--text-secondary); margin-bottom: 28px; font-size: 14px; }
    .login-box input {
      width: 100%; padding: 12px 16px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text-primary); font-size: 14px;
      outline: none; text-align: center; margin-bottom: 12px;
      transition: border-color 0.2s;
    }
    .login-box input:focus { border-color: var(--accent); }
    .login-box input::placeholder { color: var(--text-muted); }
    .login-box .error-msg { color: var(--red); font-size: 13px; margin-bottom: 12px; min-height: 20px; }
    .login-box button {
      width: 100%; padding: 12px; font-size: 14px; font-weight: 500;
      background: var(--accent); color: white; border: none; border-radius: var(--radius);
      cursor: pointer; transition: background 0.2s;
    }
    .login-box button:hover { background: var(--accent-hover); }

    /* 主布局 */
    .container { max-width: 960px; margin: 0 auto; padding: 32px 24px; }

    .header-bar {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 32px; padding-bottom: 24px; border-bottom: 1px solid var(--border);
    }
    .header-bar .brand { display: flex; align-items: center; gap: 14px; }
    .header-bar .brand-icon {
      width: 40px; height: 40px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border-radius: 10px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 700; color: white; letter-spacing: -0.5px;
    }
    .header-bar h1 { font-size: 18px; font-weight: 600; }
    .header-bar .subtitle { color: var(--text-muted); font-size: 13px; margin-top: 2px; }
    .header-bar .right button {
      padding: 7px 14px; font-size: 12px; background: transparent;
      color: var(--text-secondary); border: 1px solid var(--border);
      border-radius: 8px; cursor: pointer; transition: all 0.15s;
    }
    .header-bar .right button:hover { background: var(--bg-input); color: var(--text-primary); }

    /* 卡片 */
    .card {
      background: var(--bg-card); border-radius: 14px; padding: 24px;
      margin-bottom: 16px; border: 1px solid var(--border);
    }
    .card-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 20px;
    }
    .card-header h2 {
      font-size: 15px; font-weight: 600; display: flex; align-items: center; gap: 10px;
    }
    .card-header .badge {
      font-size: 11px; background: var(--accent); padding: 2px 8px;
      border-radius: 9999px; font-weight: 500; color: white;
    }

    /* 表单 */
    label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-weight: 500; }
    input[type="text"], textarea {
      width: 100%; padding: 10px 14px; background: var(--bg-input); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-primary); font-size: 13px; font-family: 'SF Mono', 'Fira Code', monospace;
      outline: none; transition: border-color 0.2s;
    }
    input[type="text"]:focus, textarea:focus { border-color: var(--accent); }
    input[type="text"]::placeholder, textarea::placeholder { color: var(--text-muted); }
    textarea { resize: vertical; min-height: 100px; }

    /* 按钮 */
    .btn-row { display: flex; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
    button {
      padding: 8px 16px; border: none; border-radius: 8px; font-size: 13px;
      cursor: pointer; font-weight: 500; transition: all 0.15s; white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-hover); }
    .btn-danger { background: rgba(239, 68, 68, 0.15); color: var(--red); }
    .btn-danger:hover { background: rgba(239, 68, 68, 0.25); }
    .btn-success { background: rgba(34, 197, 94, 0.15); color: var(--green); }
    .btn-success:hover { background: rgba(34, 197, 94, 0.25); }
    .btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border); }
    .btn-ghost:hover { background: var(--bg-input); color: var(--text-primary); }

    /* 统计 */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat {
      padding: 16px; background: var(--bg-input); border-radius: 10px;
      text-align: center; border: 1px solid var(--border);
    }
    .stat .num { font-size: 32px; font-weight: 700; letter-spacing: -1px; }
    .stat .label { font-size: 12px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
    .stat.total .num { color: var(--accent); }
    .stat.enabled .num { color: var(--green); }
    .stat.disabled .num { color: var(--red); }

    /* Key 列表 */
    .key-list { margin-top: 12px; }
    .key-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px; background: var(--bg-input); border-radius: 8px;
      margin-bottom: 6px; border: 1px solid var(--border); font-size: 13px;
      transition: border-color 0.15s;
    }
    .key-item:hover { border-color: var(--border-hover); }
    .key-item input[type="checkbox"] {
      width: 16px; height: 16px; flex-shrink: 0;
      accent-color: var(--accent); cursor: pointer;
    }
    .key-item .key-text {
      font-family: 'SF Mono', 'Fira Code', monospace; flex: 1;
      font-size: 12px; color: var(--text-secondary);
    }
    .key-item .key-call-count {
      font-size: 11px; color: var(--accent); font-weight: 600;
      background: rgba(99, 102, 241, 0.1); padding: 3px 8px;
      border-radius: 6px; white-space: nowrap;
    }
    .key-item .key-status {
      font-size: 12px; font-weight: 500; white-space: nowrap;
    }
    .key-item .key-status.active { color: var(--green); }
    .key-item .key-status.inactive { color: var(--red); }
    .key-item .key-reason {
      font-size: 11px; color: var(--text-muted); max-width: 160px;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }
    .key-item .key-actions { display: flex; gap: 6px; flex-shrink: 0; }
    .key-item .key-actions button { padding: 4px 10px; font-size: 11px; }

    /* 工具栏 */
    .toolbar {
      display: flex; align-items: center; gap: 8px;
      margin-bottom: 10px; font-size: 13px; color: var(--text-secondary);
      flex-wrap: wrap;
    }
    .toolbar input[type="checkbox"] {
      width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer;
    }
    .toolbar .spacer { flex: 1; }
    .toolbar button { padding: 5px 12px; font-size: 11px; }

    /* Toast */
    .toast {
      position: fixed; top: 20px; right: 20px; padding: 12px 20px;
      border-radius: 10px; font-size: 13px; font-weight: 500;
      z-index: 3000; animation: toastIn 0.3s ease-out;
      backdrop-filter: blur(12px); border: 1px solid;
    }
    .toast.success {
      background: rgba(34, 197, 94, 0.12); color: var(--green);
      border-color: rgba(34, 197, 94, 0.2);
    }
    .toast.error {
      background: rgba(239, 68, 68, 0.12); color: var(--red);
      border-color: rgba(239, 68, 68, 0.2);
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateY(-10px) scale(0.95); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .empty { text-align: center; color: var(--text-muted); padding: 40px; font-size: 14px; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <!-- 登录 -->
  <div class="login-overlay hidden" id="loginOverlay">
    <div class="login-box">
      <div class="login-logo">cc</div>
      <h1>cc2cc</h1>
      <p class="subtitle">请输入任意一个已添加的 Key 登录</p>
      <input type="password" id="loginKeyInput" placeholder="输入 Key 登录..." onkeydown="if(event.key==='Enter') doLogin()">
      <div class="error-msg" id="loginError"></div>
      <button onclick="doLogin()">登录</button>
    </div>
  </div>

  <!-- 主面板 -->
  <div class="container hidden" id="mainPanel">
    <div class="header-bar">
      <div class="brand">
        <div class="brand-icon">cc</div>
        <div>
          <h1>cc2cc</h1>
          <p class="subtitle">Anthropic &harr; OpenAI 代理转换</p>
        </div>
      </div>
      <div class="right">
        <button onclick="doLogout()">退出登录</button>
      </div>
    </div>

    <!-- 上游配置 -->
    <div class="card">
      <div class="card-header">
        <h2>上游配置</h2>
      </div>
      <label>上游 API 地址</label>
      <input type="text" id="upstreamUrl" placeholder="https://core.blink.new/api/v1/ai/chat/completions">
      <div class="btn-row">
        <button class="btn-primary" onclick="saveConfig()">保存</button>
      </div>
    </div>

    <!-- Key 管理 -->
    <div class="card">
      <div class="card-header">
        <h2>Key 管理 <span class="badge" id="keyBadge">0</span></h2>
      </div>

      <div class="stats">
        <div class="stat total"><div class="num" id="statTotal">0</div><div class="label">总计</div></div>
        <div class="stat enabled"><div class="num" id="statEnabled">0</div><div class="label">可用</div></div>
        <div class="stat disabled"><div class="num" id="statDisabled">0</div><div class="label">已禁用</div></div>
      </div>

      <label>批量添加 Key（每行一个）</label>
      <textarea id="addKeysInput" placeholder="blnk_ak_xxx&#10;blnk_ak_yyy&#10;blnk_ak_zzz"></textarea>
      <div class="btn-row">
        <button class="btn-primary" onclick="addKeys()">添加</button>
      </div>

      <div style="margin-top: 24px;">
        <div class="toolbar">
          <input type="checkbox" id="selectAll" onchange="toggleSelectAll()">
          <span>全选</span>
          <div class="spacer"></div>
          <button class="btn-danger" onclick="deleteDisabled()">删除已禁用</button>
          <button class="btn-danger" onclick="deleteSelected()">删除选中</button>
          <button class="btn-success" onclick="enableSelected()">启用选中</button>
          <button class="btn-ghost" onclick="disableSelected()">禁用选中</button>
        </div>
        <div id="keyList" class="key-list">
          <div class="empty">暂无 Key，请先添加</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let allKeys = [];
    let authToken = localStorage.getItem('cc2cc_token') || '';

    async function api(method, url, body) {
      const opts = { method, headers: { 'Content-Type': 'application/json' } };
      if (authToken) {
        opts.headers['Authorization'] = `Bearer ${authToken}`;
      }
      if (body) opts.body = JSON.stringify(body);
      const res = await fetch(url, opts);

      if (res.status === 401) {
        const data = await res.json().catch(() => ({}));
        if (data.needAuth) {
          authToken = '';
          localStorage.removeItem('cc2cc_token');
          checkAuth();
          throw new Error('需要重新登录');
        }
      }
      return res.json();
    }

    function toast(msg, type = 'success') {
      const el = document.createElement('div');
      el.className = `toast ${type}`;
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 3000);
    }

    async function checkAuth() {
      try {
        const data = await fetch('/admin/auth-status', {
          headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {},
        }).then(r => r.json());

        if (!data.needAuth) {
          showMain();
        } else if (data.authenticated) {
          showMain();
        } else {
          showLogin();
        }
      } catch {
        showLogin();
      }
    }

    function showLogin() {
      document.getElementById('loginOverlay').classList.remove('hidden');
      document.getElementById('mainPanel').classList.add('hidden');
      document.getElementById('loginError').textContent = '';
      document.getElementById('loginKeyInput').value = '';
      document.getElementById('loginKeyInput').focus();
    }

    function showMain() {
      document.getElementById('loginOverlay').classList.add('hidden');
      document.getElementById('mainPanel').classList.remove('hidden');
      loadConfig();
      loadKeys();
    }

    async function doLogin() {
      const key = document.getElementById('loginKeyInput').value.trim();
      if (!key) {
        document.getElementById('loginError').textContent = '请输入 Key';
        return;
      }

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ key }),
        });
        const data = await res.json();

        if (data.ok && data.token) {
          authToken = data.token;
          localStorage.setItem('cc2cc_token', authToken);
          showMain();
        } else {
          document.getElementById('loginError').textContent = data.error || '登录失败';
        }
      } catch (err) {
        document.getElementById('loginError').textContent = '网络错误';
      }
    }

    async function doLogout() {
      try {
        await fetch('/admin/logout', {
          method: 'POST',
          headers: authToken ? { 'Authorization': `Bearer ${authToken}` } : {},
        });
      } catch {}
      authToken = '';
      localStorage.removeItem('cc2cc_token');
      checkAuth();
    }

    async function loadConfig() {
      try {
        const data = await api('GET', '/admin/config');
        document.getElementById('upstreamUrl').value = data.upstreamBaseUrl || '';
      } catch {}
    }

    async function saveConfig() {
      const url = document.getElementById('upstreamUrl').value.trim();
      if (!url) return toast('请输入上游地址', 'error');
      try {
        await api('POST', '/admin/config', { upstreamBaseUrl: url });
        toast('配置已保存');
      } catch {}
    }

    async function loadKeys() {
      try {
        const data = await api('GET', '/admin/keys');
        allKeys = data.keys || [];
        const stats = data.stats || {};
        document.getElementById('statTotal').textContent = stats.total || 0;
        document.getElementById('statEnabled').textContent = stats.enabled || 0;
        document.getElementById('statDisabled').textContent = stats.disabled || 0;
        document.getElementById('keyBadge').textContent = stats.total || 0;
        renderKeys();
      } catch {}
    }

    function renderKeys() {
      const list = document.getElementById('keyList');
      if (allKeys.length === 0) {
        list.innerHTML = '<div class="empty">暂无 Key，请先添加</div>';
        return;
      }
      list.innerHTML = allKeys.map((k) => `
        <div class="key-item">
          <input type="checkbox" class="key-checkbox" data-key="${k.key}">
          <span class="key-text">${k.maskedKey}</span>
          <span class="key-call-count">${k.callCount || 0} 次</span>
          <span class="key-status ${k.enabled ? 'active' : 'inactive'}">${k.enabled ? '可用' : '已禁用'}</span>
          ${k.disableReason ? `<span class="key-reason" title="${k.disableReason}">${k.disableReason}</span>` : ''}
          <div class="key-actions">
            ${k.enabled
              ? `<button class="btn-ghost" onclick="toggleKey('${k.key}', false)">禁用</button>`
              : `<button class="btn-success" onclick="toggleKey('${k.key}', true)">启用</button>`}
            <button class="btn-danger" onclick="deleteKey('${k.key}')">删除</button>
          </div>
        </div>
      `).join('');
    }

    async function addKeys() {
      const text = document.getElementById('addKeysInput').value.trim();
      if (!text) return toast('请输入 Key', 'error');
      const keys = text.split('\n').map(k => k.trim()).filter(Boolean);
      try {
        const data = await api('POST', '/admin/keys', { keys });
        toast(`已添加 ${data.added} 个 Key`);
        document.getElementById('addKeysInput').value = '';
        loadKeys();
      } catch {}
    }

    async function toggleKey(key, enable) {
      try {
        if (enable) {
          await api('POST', '/admin/keys/enable', { key });
        } else {
          await api('POST', '/admin/keys/disable', { key, reason: '手动禁用' });
        }
        loadKeys();
      } catch {}
    }

    async function deleteKey(key) {
      try {
        await api('DELETE', '/admin/keys', { keys: [key] });
        toast('已删除');
        loadKeys();
      } catch {}
    }

    function getSelectedKeys() {
      return [...document.querySelectorAll('.key-checkbox:checked')].map(el => el.dataset.key);
    }

    function toggleSelectAll() {
      const checked = document.getElementById('selectAll').checked;
      document.querySelectorAll('.key-checkbox').forEach(el => { el.checked = checked; });
    }

    async function deleteSelected() {
      const keys = getSelectedKeys();
      if (keys.length === 0) return toast('请先选择 Key', 'error');
      try {
        await api('DELETE', '/admin/keys', { keys });
        toast(`已删除 ${keys.length} 个 Key`);
        loadKeys();
      } catch {}
    }

    async function enableSelected() {
      const keys = getSelectedKeys();
      if (keys.length === 0) return toast('请先选择 Key', 'error');
      try {
        for (const key of keys) await api('POST', '/admin/keys/enable', { key });
        toast(`已启用 ${keys.length} 个 Key`);
        loadKeys();
      } catch {}
    }

    async function disableSelected() {
      const keys = getSelectedKeys();
      if (keys.length === 0) return toast('请先选择 Key', 'error');
      try {
        for (const key of keys) await api('POST', '/admin/keys/disable', { key, reason: '批量手动禁用' });
        toast(`已禁用 ${keys.length} 个 Key`);
        loadKeys();
      } catch {}
    }

    async function deleteDisabled() {
      const disabledKeys = allKeys.filter(k => !k.enabled).map(k => k.key);
      if (disabledKeys.length === 0) return toast('没有已禁用的 Key', 'error');
      try {
        await api('DELETE', '/admin/keys', { keys: disabledKeys });
        toast(`已删除 ${disabledKeys.length} 个已禁用 Key`);
        loadKeys();
      } catch {}
    }

    checkAuth();
    setInterval(() => {
      if (!document.getElementById('mainPanel').classList.contains('hidden')) {
        loadKeys();
      }
    }, 10000);
  </script>
</body>
</html>
